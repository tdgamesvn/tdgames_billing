<!DOCTYPE html>
<html lang="en">

<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <link rel="icon" type="image/svg+xml" href="/favicon.svg">
  <title>TD Games - Invoice Generator</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Montserrat:wght@400;500;600;700;800&display=swap"
    rel="stylesheet">
  <script src="https://cdn.tailwindcss.com"></script>
  <script>
    tailwind.config = {
      theme: {
        extend: {
          colors: {
            primary: {
              DEFAULT: '#FF9500',
              dark: '#FF7A00',
              deep: '#E86800',
            },
            bg: '#0F0F0F',
            surface: '#1A1A1A',
            neutral: {
              light: '#F2F2F2',
              medium: '#9D9C9D',
              dark: '#404040',
            },
            status: {
              success: '#4CAF50',
              error: '#F44336',
              warning: '#FFA726',
              info: '#2196F3',
            }
          },
          fontFamily: {
            montserrat: ['Montserrat', 'sans-serif'],
          },
          backgroundImage: {
            'gradient-primary': 'linear-gradient(135deg, #FF9500 0%, #FF6B00 100%)',
            'gradient-hero': 'linear-gradient(180deg, #1A1A1A 0%, #0F0F0F 100%)',
          },
          boxShadow: {
            'btn-glow': '0 8px 24px rgba(255, 149, 0, 0.4)',
            'btn-glow-hover': '0 12px 32px rgba(255, 149, 0, 0.6)',
            'card-glow': '0 8px 32px rgba(0, 0, 0, 0.4)',
            'card-glow-hover': '0 16px 48px rgba(255, 149, 0, 0.3)',
          }
        }
      }
    }
  </script>
  <style>
    body {
      background-color: #0F0F0F;
      color: #F2F2F2;
      font-family: 'Montserrat', sans-serif;
    }

    @keyframes fadeInUp {
      from {
        opacity: 0;
        transform: translateY(30px)
      }

      to {
        opacity: 1;
        transform: translateY(0)
      }
    }

    .animate-fadeInUp {
      animation: fadeInUp 0.6s ease-out forwards;
    }

    input::-webkit-outer-spin-button,
    input::-webkit-inner-spin-button {
      -webkit-appearance: none;
      margin: 0;
    }

    /* Print Styles - Color-accurate PDF Export */
    @media print {
      @page {
        margin: 0;
        size: auto;
      }

      html,
      body {
        height: 100%;
        margin: 0 !important;
        padding: 0 !important;
        -webkit-print-color-adjust: exact !important;
        print-color-adjust: exact !important;
      }

      /* Hide everything except the invoice */
      nav,
      footer,
      .actions-sidebar,
      button,
      .no-print,
      header {
        display: none !important;
      }

      #root {
        padding: 0 !important;
        margin: 0 !important;
      }

      main {
        padding: 0 !important;
        margin: 0 !important;
        width: 100% !important;
        max-width: none !important;
        display: block !important;
      }

      /* The invoice container */
      #invoice-capture {
        box-shadow: none !important;
        width: 210mm !important;
        min-height: auto !important;
        margin: 0 auto !important;
        padding: 18mm !important;
        box-sizing: border-box !important;
        position: relative !important;
        overflow: visible !important;
        transform: none !important;
        filter: none !important;
        border: none !important;
        border-radius: 0 !important;
        -webkit-print-color-adjust: exact !important;
        print-color-adjust: exact !important;
      }

      /* Force all elements to print their backgrounds/colors */
      *,
      *::before,
      *::after {
        -webkit-print-color-adjust: exact !important;
        print-color-adjust: exact !important;
        text-shadow: none !important;
      }

      /* Drop shadow - remove for print */
      .drop-shadow-\[0_0_15px_rgba\(255\,149\,0\,0\.4\)\] {
        filter: none !important;
      }

      /* Ensure images print */
      img {
        max-width: 100% !important;
        display: block !important;
      }
    }
  </style>
  <script type="importmap">
{
  "imports": {
    "react": "https://esm.sh/react@^19.2.3",
    "react-dom/": "https://esm.sh/react-dom@^19.2.3/",
    "react/": "https://esm.sh/react@^19.2.3/",
    "jspdf": "https://esm.sh/jspdf@^3.0.4",
    "xlsx": "https://esm.sh/xlsx@^0.18.5",
    "html2canvas": "https://esm.sh/html2canvas@^1.4.1"
  }
}
</script>
  <link rel="stylesheet" href="/index.css">
</head>

<body>
  <div id="root"></div>
  <script type="module" src="/index.tsx"></script>
</body>

</html>
