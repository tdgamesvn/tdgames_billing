      <stop offset="0%" stop-color="#FFA500"/>
      <stop offset="100%" stop-color="#FF6B00"/>
    </linearGradient>
  </defs>
  <!-- TD Games cube logo - simplified for favicon -->
  <g fill="url(#g)">
